plugins {
    id 'java'
    id 'jacoco'
    id 'xyz.jpenilla.run-paper' version '3.0.2'
}

group = 'me.crafter.mc.lockettepro'
version = pluginVersion

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(26)
    }
}

configurations.all {
    exclude group: 'org.bukkit', module: 'bukkit'
}

repositories {
    mavenCentral()
    maven {
        name = "papermc"
        url = "https://repo.papermc.io/repository/maven-public/"
    }
    maven {
        name = "enginehub"
        url = "https://maven.enginehub.org/repo/"
    }
    maven {
        name = "jitpack"
        url = "https://jitpack.io"
    }
    maven {
        name = "playpro"
        url = "https://maven.playpro.com"
    }
}

dependencies {
    compileOnly "io.papermc.paper:paper-api:26.2.build.+"
    compileOnly "com.sk89q.worldguard:worldguard-bukkit:7.0.10"
    compileOnly "net.dmulloy2:ProtocolLib:5.4.0"
    compileOnly "com.github.MilkBowl:VaultAPI:1.7"
    compileOnly "net.coreprotect:coreprotect:22.4"

    testImplementation "org.mockbukkit.mockbukkit:mockbukkit-v26.1.2:4.114.0"
    testImplementation "org.junit.jupiter:junit-jupiter:5.11.4"
    testImplementation "io.papermc.paper:paper-api:26.1.2.build.+"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"
}

test {
    useJUnitPlatform()
    finalizedBy jacocoTestReport
    
    // Force the test task to compile and run against the compiled JAR file rather than raw class/resource directories.
    // MockBukkit's Paper classloader expects to read plugin.yml and plugin classes from a valid ZIP/JAR structure
    // to determine the plugin's environment. Without this, MockBukkit fails to resolve resources.
    dependsOn jar
    classpath = project.files(jar.archiveFile) + (classpath - sourceSets.main.output)
    
    // Allow ByteBuddy (used by MockBukkit) to reflectively inject the generated plugin subclass into the classloader.
    // This bypasses Java 16+ module encapsulation restrictions on class definition APIs.
    jvmArgs '--add-opens', 'java.base/java.lang=ALL-UNNAMED'
    
    // Disable ByteBuddy's "safe" checks on Java 26. By default, Java 26 blocks Unsafe-based class injection.
    // Setting this to false allows MockBukkit's subclass injector to use JVM-internal Unsafe APIs, which
    // prevents classloading failures during test execution.
    systemProperty 'net.bytebuddy.safe', 'false'
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
    }
}

processResources {
    def props = [
        pluginName: pluginName,
        pluginVersion: pluginVersion,
        pluginMainCommand: pluginMainCommand
    ]
    inputs.properties props
    filteringCharset 'UTF-8'
    filesMatching(['plugin.yml', 'lang*.yml']) {
        expand props
    }
}

runServer {
    minecraftVersion("26.2")
    jvmArgs("-Djava.io.tmpdir=/tmp")
}

