command-usage: "&6&l[${pluginName}] Help\\n&71. Lock a block: &ePlace a sign on it and write &f[Private]&e on line 1.\\n&72. Add a user: &eRight-click the sign, then run &f/lock <line> <username>&e to edit a line.\\n&73. Unlock a block: &eBreak the &f[Private]&e sign on the block.\\n&74. Public access: &eWrite &f[Everyone]&e on a sign line to allow anyone.\\n&75. Auto-close doors: &eWrite &f[Timer:<seconds>]&e on a sign line.\\n&76. Reload config: &eRun &f/lock reload&e to apply config changes.\\n&6${pluginName} by connection_lost"
