command-usage: "&6&l[${pluginName}] 도움말\n&71. 블록 잠금: &e표지판을 블록에 설치하고 1번 줄에 &f[Private]&e를 작성하세요.\n&72. 유저 추가: &e표지판을 우클릭한 후 &f/lock <줄 번호> <유저명>&e을 입력해 줄을 수정하세요.\n&73. 블록 잠금 해제: &e블록의 &f[Private]&e 표지판을 파괴하세요.\n&74. 공개 접근: &e표지판의 줄에 &f[Everyone]&e를 작성하면 누구나 접근할 수 있습니다.\n&75. 자동 닫힘: &e표지판의 줄에 &f[Timer:<초>]&e를 작성하세요.\n&76. 설정 리로드: &e&f/lock reload&e를 실행하여 변경 사항을 적용하세요.\n&6${pluginName} by connection_lost & Korean translation by irochi.moe"
