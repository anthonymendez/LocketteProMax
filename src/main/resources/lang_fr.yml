command-usage: "&6&l[${pluginName}] Aide\n&71. Verrouiller un bloc: &ePlace un panneau sur le bloc et écris &f[Private]&e à la ligne 1.\n&72. Ajouter un joueur: &eFais un clic droit sur le panneau, puis entre &f/lock <ligne> <joueur>&e pour modifier la ligne.\n&73. Déverrouiller un bloc: &eCasse le panneau &f[Private]&e sur le bloc.\n&74. Accès public: &eÉcris &f[Everyone]&e sur une ligne du panneau pour autoriser tout le monde.\n&75. Fermeture automatique: &eÉcris &f[Timer:<secondes>]&e sur une ligne du panneau.\n&76. Recharger la config: &eExécute &f/lock reload&e pour appliquer les changements.\n&6${pluginName} par connection_lost"
