name: Build & Test LocketteProMax

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Tests & Build Plugin JAR
        run: ./gradlew test build

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocketteProMax-Plugin
          path: build/libs/*.jar
          if-no-files-found: error
